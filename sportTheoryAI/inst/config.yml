# sportTheoryAI configuration
# Backends: "deepseek", "claude", "kimi"
# Set with: options(sportTheoryAI.backend = "deepseek")

# Claude API backend configuration
# Activated with: options(sportTheoryAI.backend = "claude")
claude:
  model: "claude-sonnet-4-6"
  max_tokens: 4096
  temperature: 0
  timeout_seconds: 180
  api_version: "2023-06-01"
  # v5 prompts are Claude-optimised with system/user separation
  prompts:
    theory_extraction: "theory_extraction_v5_claude.txt"
    hypothesis_extraction: "hypothesis_extraction_v5_claude.txt"
    discussion_analysis: "discussion_analysis_v5_claude.txt"
    methods_extraction: "methods_extraction_v5_claude.txt"

# Kimi (Moonshot AI) backend configuration
# Activated with: options(sportTheoryAI.backend = "kimi")
kimi:
  model: "moonshot-v1-32k"
  max_tokens: 4096
  temperature: 0
  timeout_seconds: 180
  # Reuses Claude v5 prompts (same system/user delimiter format)
  prompts:
    theory_extraction: "theory_extraction_v5_claude.txt"
    hypothesis_extraction: "hypothesis_extraction_v5_claude.txt"
    discussion_analysis: "discussion_analysis_v5_claude.txt"
    methods_extraction: "methods_extraction_v5_claude.txt"

# DeepSeek API backend configuration
# Activated with: options(sportTheoryAI.backend = "deepseek")
deepseek:
  model: "deepseek-v4-pro"    # V4 Pro — use "deepseek-chat" for V3, "deepseek-reasoner" for R1
  max_tokens: 4096
  temperature: 0
  timeout_seconds: 180
  prompts:
    theory_extraction: "theory_extraction_v5_claude.txt"
    hypothesis_extraction: "hypothesis_extraction_v5_claude.txt"
    discussion_analysis: "discussion_analysis_v5_claude.txt"
    methods_extraction: "methods_extraction_v5_claude.txt"

logging:
  enabled: true
  log_file: "sportTheoryAI_log.jsonl"
  log_prompts: false      # set true during development/debugging
